name: CD

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
      SSH_KEY: ${{ secrets.SSH_KEY }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
    steps:
      - name: Check deployment secrets
        run: |
          missing=0
          for name in SSH_HOST SSH_USERNAME SSH_KEY SSH_PORT; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing deployment secret::$name is required for manual CD."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "CD is manual because this project is currently local-only. Configure the SSH secrets after a production server is ready."
            exit 1
          fi

      - uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /opt/ai-health-trainer
            git pull origin main
            docker compose -f docker-compose.prod.yml build --no-cache backend
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head
            docker system prune -f
