name: frontend
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  # state management
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0
  # routing
  go_router: ^14.0.0
  # HTTP
  dio: ^5.7.0
  # UI
  google_fonts: ^6.2.0
  flutter_svg: ^2.0.0
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  cached_network_image: ^3.4.0
  # features
  image_picker: ^1.1.0
  intl: ^0.19.0
  # storage
  flutter_secure_storage: ^9.2.0
  shared_preferences: ^2.3.0
  # misc
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.6.0
  build_runner: ^2.4.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
